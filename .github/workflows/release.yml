name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0. Leave empty to use package.json version."
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="${{ github.event.inputs.tag }}"

          if [ -z "${RELEASE_TAG}" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              RELEASE_TAG="${GITHUB_REF_NAME}"
            else
              RELEASE_TAG="v${PACKAGE_VERSION}"
            fi
          fi

          if [ "${RELEASE_TAG}" != "v${PACKAGE_VERSION}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package.json version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Package extension
        run: npx --yes @vscode/vsce package

      - name: Capture VSIX path
        run: echo "VSIX_PATH=$(find . -maxdepth 1 -name '*.vsix' -print | head -n 1)" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: ${{ env.VSIX_PATH }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Side Docs ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: ${{ env.VSIX_PATH }}
